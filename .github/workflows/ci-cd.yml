name: CI/CD — Back Despachos

# ─────────────────────────────────────────────────────────────────
# Trigger: se activa únicamente cuando se hace push a la rama deploy
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - deploy

env:
  IMAGE_NAME: back-despachos

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Build & Push imagen a Docker Hub
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 2: Deploy en EC2 (SSH)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Iniciando deploy back-despachos ==="

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            cd ~/app

            docker compose pull back-despachos

            # Solo reinicia el servicio de despachos
            docker compose up -d --no-deps back-despachos

            docker image prune -f

            echo "=== Deploy back-despachos completado ==="
